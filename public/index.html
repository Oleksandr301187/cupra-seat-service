<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>СЕРВІС | Електронна Черга</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #0b0e14; color: white; height: 100vh; overflow: hidden; }
        select, input { background: #1e293b; color: white; border: 1px solid #475569; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; box-sizing: border-box; }
        .btn-universal { border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; color: white; transition: 0.2s; }
        .scan-box { background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed #ff4d4d; text-align: center; }
        .scan-btn { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        #cameraInput { display: none; }
        
        #splashScreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000000 url('1783799425622.jpeg') center/cover no-repeat; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s ease-out; }
        #splashScreen::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 1; }
        .splash-content { position: relative; z-index: 2; text-align: center; }
        .progress-container { width: 320px; height: 6px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-bar { height: 100%; width: 0%; background: #ff4d4d; animation: loadProgress 3s forwards; }
        @keyframes loadProgress { to { width: 100%; } }

        #loginScreen { display: none; width: 100vw; height: 100vh; justify-content: center; align-items: center; background: linear-gradient(rgba(11, 14, 20, 0.7), rgba(11, 14, 20, 0.8)), url('1783799425622.jpeg') center/cover no-repeat; }
        .login-box { background: rgba(22, 28, 36, 0.95); padding: 40px; border-radius: 16px; width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        .autocomplete-suggestions { position: absolute; top: 72px; left: 0; width: 100%; background: #1e293b; border: 1px solid #ff4d4d; border-radius: 6px; z-index: 100; display: none; }
        .suggestion-item { padding: 12px; cursor: pointer; }
        .suggestion-item:hover { background: #ff4d4d; }
        
        #appInterface { display: none; height: 100vh; flex-direction: column; }
        .user-status-bar { background: #161c24; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        .tab-content { display: none; flex: 1; overflow: hidden; }
        .service-layout { display: flex; width: 100%; height: 100%; background: #f4f6f9; color: #1e293b; }
        .srv-left, .srv-right { width: 50%; padding: 25px; overflow-y: auto; }
        .srv-table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        .srv-table th, .srv-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div id="splashScreen"><div class="splash-content"><div style="font-size:38px; font-weight:900;">SEAT & CUPRA ЦЕНТР КИЇВ</div><div class="progress-container"><div class="progress-bar"></div></div></div></div>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="text-align:center;">СЕРВІС: АВТОРИЗАЦІЯ</h2>
            <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
                <div class="form-group"><label>Роль</label><select id="userRole" onchange="toggleRoleFields()"><option value="Сервіс">Сервіс</option><option value="Mechanic">Механік</option><option value="Склад">Склад</option><option value="Mon_Client">Інфомонітор 📺</option><option value="Admin">Адмін ⚙️</option></select></div>
                <div id="staffFields" class="form-group"><label>Прізвище</label><input type="text" id="userLastName" oninput="handleLastNameInput()"><div id="autocompleteBox" class="autocomplete-suggestions"></div></div>
                <div id="staffFields2" class="form-group"><label>Ім'я</label><input type="text" id="userFirstName"></div>
                <button type="submit" class="btn-universal" style="background:#ff4d4d; width:100%;">Увійти</button>
            </form>
        </div>
    </div>

    <div id="appInterface">
        <div class="user-status-bar">
            <div style="font-size:20px; font-weight:900; text-transform:uppercase;">СЕРВІС</div>
            <button class="btn-universal" onclick="doLogout()">◀ Вихід</button>
        </div>
        <div id="tab-Сервіс" class="tab-content" style="display:block;">
            <div class="service-layout">
                <div class="srv-left">
                    <h2>Реєстрація авто</h2>
                    <form id="regForm">
                        <div class="form-group"><label>Номер авто</label><input type="text" id="plateNumber" required></div>
                        <div class="form-group"><label>Номер заявки</label><input type="text" id="ticketNumber" required>
                            <div class="scan-box">
                                <button type="button" class="scan-btn" onclick="document.getElementById('cameraInput').click()">📸 Сканувати наряд</button>
                                <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="processScan(event)">
                            </div>
                        </div>
                        <button type="button" class="btn-universal" style="background:#dc3545; width:100%;" onclick="submitRegistration()">В роботу</button>
                    </form>
                </div>
                <div class="srv-right"><h2>Журнал</h2><table class="srv-table"><thead><tr><th>Авто</th><th>Заявка</th></tr></thead><tbody id="srvJournalTable"></tbody></table></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localUsersDB = JSON.parse(localStorage.getItem('sto_users_db')) || [];

        async function processScan(event) {
            const file = event.target.files[0];
            if (!file) return;
            const input = document.getElementById('ticketNumber');
            input.value = "Зчитування...";
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'ukr+eng');
                const match = text.match(/Заявка[\s\S]*?№\s*([A-Za-z0-9]+)/i);
                input.value = match ? match[1].toUpperCase() : "";
                if(!match) alert("Номер не знайдено!");
            } catch (err) { alert("Помилка"); input.value = ""; }
        }

        setTimeout(() => { document.getElementById('splashScreen').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }, 3000);
        
        function handleLastNameInput() {
            const val = document.getElementById('userLastName').value.trim().toLowerCase();
            const box = document.getElementById('autocompleteBox'); box.innerHTML = '';
            if (val.length < 3) { box.style.display = 'none'; return; }
            const matches = localUsersDB.filter(u => u.lastName.toLowerCase().startsWith(val));
            if (matches.length > 0) {
                box.style.display = 'block';
                matches.forEach(m => {
                    const item = document.createElement('div'); item.className = 'suggestion-item'; item.innerText = `👤 ${m.lastName} ${m.firstName}`;
                    item.onclick = () => { document.getElementById('userLastName').value = m.lastName; document.getElementById('userFirstName').value = m.firstName; box.style.display = 'none'; };
                    box.appendChild(item);
                });
            }
        }

        function toggleRoleFields() {
            const role = document.getElementById('userRole').value;
            document.getElementById('staffFields').style.display = (role === 'Mon_Client' || role === 'Admin') ? 'none' : 'flex';
            document.getElementById('staffFields2').style.display = (role === 'Mon_Client' || role === 'Admin') ? 'none' : 'flex';
        }

        function doLogin() {
            const role = document.getElementById('userRole').value;
            const ln = document.getElementById('userLastName').value.trim();
            const fn = document.getElementById('userFirstName').value.trim();
            if (role !== 'Admin' && role !== 'Mon_Client' && (!ln || !fn)) return alert("Заповніть дані!");
            socket.emit('registerUser', { lastName: ln, firstName: fn, role: role });
        }
        
        function doLogout() { socket.emit('logoutUser'); location.reload(); }
        function submitRegistration() { alert("Заявку відправлено!"); }
        
        socket.on('updateQueue', (queue) => {
            const tbody = document.getElementById('srvJournalTable');
            tbody.innerHTML = queue.map(i => `<tr><td>${i.plateNumber}</td><td>${i.ticketNumber}</td></tr>`).join('');
        });
    </script>
</body>
</html>
