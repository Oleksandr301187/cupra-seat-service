<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUPRA | Склад деталей</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: #0b0e14;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-sizing: border-box;
        }
        .card {
            background: linear-gradient(135deg, #181e29 0%, #0e121a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { margin: 0 0 15px 0; color: #38bdf8; text-transform: uppercase; font-size: 18px; }
        input, button {
            width: 100%; padding: 14px; border-radius: 16px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: #111622; color: white;
            box-sizing: border-box;
        }
        button { background: #38bdf8; color: #0b0e14; font-weight: bold; border: none; cursor: pointer; }
        .queue-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 20px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge-new { background: #ef4444; color: white; padding: 4px 10px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <audio id="storage-sound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>

    <div class="header">
        <div><span style="font-weight: bold; color: #38bdf8;">CUPRA</span> STORAGE</div>
        <a href="/" style="color: #8a99ad; text-decoration: none; font-size: 14px;">❮ На головну</a>
    </div>

    <div class="container">
        <div class="card">
            <h2>Запит на запчастини</h2>
            <input type="text" id="storeOrderId" placeholder="Номер заявки / Пост">
            <input type="text" id="storeDesc" placeholder="Що необхідно (фільтри, олива, колодки...)">
            <button onclick="sendRequest()">Надіслати на склад</button>
        </div>

        <div class="card">
            <h2>Черга комплектації складу</h2>
            <div id="storage-list">
                <!-- Сюди потрапляють активні запити деталей -->
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const sound = document.getElementById('storage-sound');

        function sendRequest() {
            const orderId = document.getElementById('storeOrderId').value;
            const description = document.getElementById('storeDesc').value;
            if(!orderId || !description) return alert("Заповніть усі поля!");

            socket.emit('storage_request', { orderId, description });
            document.getElementById('storeOrderId').value = '';
            document.getElementById('storeDesc').value = '';
        }

        socket.on('storage_alert', () => {
            sound.play().catch(e => console.log("Чекаємо на клік для активації аудіо"));
        });

        socket.on('init_state', renderQueue);
        socket.on('state_updated', renderQueue);

        function renderQueue(state) {
            const list = document.getElementById('storage-list');
            list.innerHTML = state.storageQueue.length === 0 ? '<p style="color:#4b5563;">Запитів немає</p>' : '';
            
            state.storageQueue.forEach(req => {
                list.innerHTML += `
                    <div class="queue-item">
                        <div>
                            <strong style="color:#38bdf8;">${req.orderId}</strong><br>
                            <span style="font-size:14px; color:#94a3b8;">${req.description}</span>
                        </div>
                        <span class="badge-new">${req.status}</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
