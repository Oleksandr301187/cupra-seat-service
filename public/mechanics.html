<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUPRA | Цех механіків</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: #0b0e14;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .grid-posts {
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            box-sizing: border-box;
        }
        /* Округлена картка поста */
        .post-card {
            background: linear-gradient(135deg, #181e29 0%, #0e121a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-left: 6px solid #4ade80;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
            margin-bottom: 14px;
        }
        .post-title { font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .mechanic-name { font-size: 13px; color: #4ade80; background: rgba(74,222,128,0.1); padding: 4px 10px; border-radius: 12px; }
        .car-info { background: rgba(0,0,0,0.2); padding: 14px; border-radius: 20px; margin-top: 10px; }
        .no-car { color: #4b5563; font-style: italic; font-size: 14px; padding: 10px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div><span style="font-weight: bold; color: #4ade80;">CUPRA</span> WORKSHOP</div>
        <a href="/" style="color: #8a99ad; text-decoration: none; font-size: 14px;">❮ На головну</a>
    </div>

    <div class="grid-posts" id="workshop-grid">
        <!-- Картки постів будуть згенеровані автоматично -->
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('init_state', renderWorkshop);
        socket.on('state_updated', renderWorkshop);

        function renderWorkshop(state) {
            const grid = document.getElementById('workshop-grid');
            grid.innerHTML = '';

            Object.keys(state.posts).forEach(postName => {
                const post = state.posts[postName];
                if(!post.active) return; // Пропускаємо приховані пости

                let carHtml = `<div class="no-car">Пост вільний</div>`;
                
                if (post.currentCar) {
                    carHtml = `
                        <div class="car-info">
                            <span style="font-size:12px; color:#8a99ad; text-transform:uppercase;">У роботі:</span>
                            <div style="font-size:22px; font-weight:bold; color:#ffca28; margin: 4px 0;">${post.currentCar.carNumber}</div>
                            <div style="font-size:13px; color:#94a3b8;">Заявка: <strong>${post.currentCar.orderId}</strong></div>
                            <div style="font-size:12px; color:#64748b; margin-top:4px;">Приймальник: ${post.currentCar.masterName}</div>
                        </div>
                    `;
                }

                let nextCarHtml = '';
                if (post.nextCar) {
                    nextCarHtml = `
                        <div style="margin-top: 12px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.05); font-size: 13px; color: #94a3b8;">
                            ⏭️ Наступний в черзі: <strong style="color:#fff;">${post.nextCar.carNumber}</strong> (${post.nextCar.orderId})
                        </div>
                    `;
                }

                grid.innerHTML += `
                    <div class="post-card">
                        <div class="post-header">
                            <span class="post-title">${postName}</span>
                            <span class="mechanic-name">👤 ${post.mechanic}</span>
                        </div>
                        ${carHtml}
                        ${nextCarHtml}
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
